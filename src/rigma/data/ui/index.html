<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rigma</title>
<link rel="manifest" href="/ui/manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230b0d0f'/%3E%3Ctext x='8' y='12' font-size='10' font-family='monospace' font-weight='bold' text-anchor='middle' fill='%23e8a94f'%3Er%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/ui/style.css">
</head>
<body>
<aside id="rail">
  <div class="rail-head">
    <span class="wordmark">rigma</span>
    <button id="new-chat" type="button">+ new</button>
  </div>
  <input id="rail-search" placeholder="search chats" spellcheck="false"
         aria-label="Search chats">
  <nav id="chat-list" aria-label="Chats"></nav>
  <section id="docs-panel">
    <button id="docs-toggle" type="button" aria-expanded="false">
      <span class="dot" id="rag-dot" aria-hidden="true"></span>my documents
    </button>
    <div id="docs-body" hidden>
      <label class="rag-switch" title="Answer this chat from your indexed documents">
        <input type="checkbox" id="use-rag">use in this chat</label>
      <ul id="source-list"></ul>
      <form id="add-source">
        <input id="source-path" placeholder="C:\path\to\folder" spellcheck="false"
               aria-label="Folder to index">
        <button type="submit">Add</button>
      </form>
      <div id="docs-status" class="dim" role="status"></div>
    </div>
  </section>
</aside>
<div id="rail-scrim" hidden></div>
<main>
  <header>
    <button id="rail-toggle" type="button" aria-label="Toggle chat list">☰</button>
    <span class="spec" id="model">connecting…</span>
    <button id="engine-chip" type="button" title="Engine room">
      <span class="dot" id="engine-dot"></span><span id="engine-label">engine</span>
    </button>
    <span class="tps" id="tps"></span>
    <button id="gear" type="button" aria-label="Settings">⚙</button>
  </header>
  <div id="sys-bar">
    <button id="sys-toggle" type="button" aria-expanded="false">sys ▸</button>
    <span id="sys-preview" class="dim"></span>
    <select id="preset-pick" aria-label="Preset for this chat">
      <option value="">no preset</option>
    </select>
    <button id="effort-toggle" type="button" hidden
            title="Reasoning effort for this chat">effort ▸ auto</button>
    <button id="notes-toggle" type="button" aria-expanded="false">notes ▸</button>
    <button id="an-toggle" type="button" aria-expanded="false"
            title="Author's note — injected near the end of context to steer prose">note ▸</button>
  </div>
  <textarea id="sys-edit" hidden spellcheck="false" rows="4"
    placeholder="System prompt for this chat"></textarea>
  <textarea id="notes-edit" hidden spellcheck="false" rows="4"
    placeholder="Story notes — always in context, authoritative"></textarea>
  <div id="an-edit" hidden>
    <textarea id="an-text" spellcheck="false" rows="2"
      placeholder="Author's note — steers tone/direction from just behind the latest turn"></textarea>
    <label class="an-depth">inject <input id="an-depth" type="number"
      min="0" max="20" value="3" aria-label="Author's note depth"> turns from the end</label>
  </div>
  <div id="log">
    <div class="empty" id="empty"><b>Talk to your model.</b>
      Runs on your GPU. Nothing leaves this machine.</div>
  </div>
  <div id="composer">
    <div id="ctx-row">
      <div id="ctx-bar" title=""><div id="ctx-fill"></div></div>
      <button id="ctx-compact" type="button" hidden
              title="Summarize older turns to reclaim context">compact</button>
    </div>
    <div id="img-chips" hidden></div>
    <div id="prefill-row" hidden>
      <input id="prefill-text" spellcheck="false"
        placeholder="Prefill — force the reply to begin with this (steers past refusals/loops)">
      <button id="prefill-clear" type="button" aria-label="Clear prefill">✕</button>
    </div>
    <form id="f">
      <button id="attach" type="button" title="Attach image (or paste one)">+</button>
      <button id="prefill-toggle" type="button"
              title="Prefill the assistant's reply">✎</button>
      <input id="img-file" type="file" accept="image/*" multiple hidden>
      <textarea id="in" placeholder="Ask anything — Enter to send, Shift+Enter for a new line"
        autofocus></textarea>
      <button class="send" id="send" type="submit">Send</button>
    </form>
  </div>
</main>
<div id="drawer-scrim" hidden></div>
<aside id="drawer" hidden aria-label="Settings">
  <div class="drawer-head">
    <nav id="drawer-tabs" role="tablist">
      <button type="button" role="tab" aria-selected="true" data-tab="chat" class="active">Chat</button>
      <button type="button" role="tab" aria-selected="false" data-tab="presets">Presets</button>
      <button type="button" role="tab" aria-selected="false" data-tab="models">Models</button>
      <button type="button" role="tab" aria-selected="false" data-tab="server">Server</button>
    </nav>
    <button id="drawer-close" type="button" aria-label="Close settings">✕</button>
  </div>
  <div id="drawer-body" role="tabpanel"></div>
</aside>
<div id="switching" hidden><div>switching model…</div></div>
<div id="palette" hidden>
  <div id="palette-box">
    <input id="palette-input" placeholder="Type a command or search chats…"
           spellcheck="false" aria-label="Command palette">
    <div id="palette-list" role="listbox"></div>
  </div>
</div>
<script src="/ui/md.js"></script>
<script src="/ui/store.js"></script>
<script src="/ui/app.js"></script>
<script src="/ui/panels.js"></script>
<script src="/ui/features.js"></script>
</body>
</html>
