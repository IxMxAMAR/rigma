<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rigma</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230b0d0f'/%3E%3Ctext x='8' y='12' font-size='10' font-family='monospace' font-weight='bold' text-anchor='middle' fill='%23e8a94f'%3Er%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/ui/style.css">
</head>
<body>
<aside id="rail">
  <div class="rail-head">
    <span class="wordmark">rigma</span>
    <button id="new-chat" type="button">+ new</button>
  </div>
  <nav id="chat-list" aria-label="Chats"></nav>
  <section id="docs-panel">
    <button id="docs-toggle" type="button" aria-expanded="false">
      <span class="dot" id="rag-dot" aria-hidden="true"></span>my documents
    </button>
    <div id="docs-body" hidden>
      <label class="rag-switch" title="Answer this chat from your indexed documents">
        <input type="checkbox" id="use-rag">use in this chat</label>
      <ul id="source-list"></ul>
      <form id="add-source">
        <input id="source-path" placeholder="C:\path\to\folder" spellcheck="false"
               aria-label="Folder to index">
        <button type="submit">Add</button>
      </form>
      <div id="docs-status" class="dim" role="status"></div>
    </div>
  </section>
</aside>
<div id="rail-scrim" hidden></div>
<main>
  <header>
    <button id="rail-toggle" type="button" aria-label="Toggle chat list">☰</button>
    <span class="spec" id="model">connecting…</span>
    <span class="tps" id="tps"></span>
  </header>
  <div id="sys-bar">
    <button id="sys-toggle" type="button" aria-expanded="false">sys ▸</button>
    <span id="sys-preview" class="dim"></span>
    <select id="preset-pick" aria-label="Preset for this chat">
      <option value="">no preset</option>
    </select>
    <button id="notes-toggle" type="button" aria-expanded="false">notes ▸</button>
  </div>
  <textarea id="sys-edit" hidden spellcheck="false" rows="4"
    placeholder="System prompt for this chat"></textarea>
  <textarea id="notes-edit" hidden spellcheck="false" rows="4"
    placeholder="Story notes — always in context, authoritative"></textarea>
  <div id="log">
    <div class="empty" id="empty"><b>Talk to your model.</b>
      Runs on your GPU. Nothing leaves this machine.</div>
  </div>
  <div id="composer">
    <div id="ctx-bar" title=""><div id="ctx-fill"></div></div>
    <form id="f">
      <textarea id="in" placeholder="Ask anything — Enter to send, Shift+Enter for a new line"
        autofocus></textarea>
      <button class="send" id="send" type="submit">Send</button>
    </form>
  </div>
</main>
<script src="/ui/md.js"></script>
<script src="/ui/store.js"></script>
<script src="/ui/app.js"></script>
</body>
</html>
