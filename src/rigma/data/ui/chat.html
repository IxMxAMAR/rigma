<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rigma</title>
<style>
  :root { --bg:#101214; --panel:#191c1f; --line:#2a2e33; --fg:#dde1e4;
          --dim:#8f969e; --amber:#e0a458; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--fg); height:100vh; height:100dvh;
         display:flex; flex-direction:column;
         font:15px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif; }
  header { display:flex; gap:14px; align-items:baseline; padding:10px 16px;
           border-bottom:1px solid var(--line);
           font:12px ui-monospace, "Cascadia Mono", Consolas, monospace; }
  header .wordmark { color:var(--fg); font-weight:700; letter-spacing:.08em; }
  header .spec { color:var(--dim); overflow:hidden; text-overflow:ellipsis;
                 white-space:nowrap; }
  header .tps { color:var(--amber); min-width:7ch; }
  header button { margin-left:auto; background:none; border:1px solid var(--line);
           color:var(--dim); border-radius:6px; padding:2px 10px; cursor:pointer;
           font:inherit; }
  header button:hover { color:var(--fg); border-color:var(--dim); }
  #log { flex:1; overflow-y:auto; padding:18px 12px; }
  .empty { max-width:720px; margin:14vh auto 0; color:var(--dim);
           text-align:center; }
  .empty b { color:var(--fg); font-weight:600; display:block; margin-bottom:6px; }
  .msg { max-width:720px; margin:0 auto 14px; padding:10px 14px;
         border-radius:8px; white-space:pre-wrap; overflow-wrap:break-word; }
  .user { border:1px solid var(--line); background:var(--panel); }
  .bot  { border:1px solid transparent; }
  .bot.thinking { color:var(--dim); font-style:italic; }
  form { display:flex; gap:8px; padding:12px 16px 16px;
         border-top:1px solid var(--line); }
  textarea { flex:1; resize:none; background:var(--panel); color:var(--fg);
             border:1px solid var(--line); border-radius:8px; padding:10px 12px;
             font:inherit; min-height:44px; max-height:180px; }
  textarea:focus { outline:1px solid var(--amber); outline-offset:0; }
  button.send { background:var(--amber); color:#231803; border:0;
                border-radius:8px; padding:0 18px; font-weight:600;
                cursor:pointer; font:inherit; }
  button.send:disabled { opacity:.4; cursor:default; }
  @media (max-width:600px) { header .spec { display:none; } }
</style>
</head>
<body>
<header>
  <span class="wordmark">rigma</span>
  <span class="spec" id="model">connecting…</span>
  <span class="tps" id="tps"></span>
  <button id="clear" type="button">clear</button>
</header>
<div id="log">
  <div class="empty" id="empty"><b>Talk to your model.</b>
    Runs on your GPU. Nothing leaves this machine.</div>
</div>
<form id="f">
  <textarea id="in" placeholder="Ask anything — Enter to send, Shift+Enter for a new line"
    autofocus></textarea>
  <button class="send" id="send">Send</button>
</form>
<script>
const log = document.getElementById("log"), input = document.getElementById("in"),
      form = document.getElementById("f"), send = document.getElementById("send"),
      tps = document.getElementById("tps");
let history = [];

fetch("/api/status").then(r => r.ok ? r.json() : null).then(s => {
  document.getElementById("model").textContent =
    s ? s.model + " (" + s.quant + ")" : "server not running";
}).catch(() => {});

function add(cls, text) {
  const e = document.getElementById("empty");
  if (e) e.remove();
  const d = document.createElement("div");
  d.className = "msg " + cls; d.textContent = text;
  log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
}

document.getElementById("clear").onclick = () => {
  history = []; log.innerHTML = ""; tps.textContent = ""; input.focus();
};

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});

form.onsubmit = async e => {
  e.preventDefault();
  const q = input.value.trim(); if (!q) return;
  input.value = ""; send.disabled = true;
  add("user", q); history.push({role: "user", content: q});
  const bot = add("bot thinking", "…");
  const t0 = performance.now(); let ntok = 0, text = "";
  try {
    const r = await fetch("/v1/chat/completions", {
      method: "POST", headers: {"content-type": "application/json"},
      body: JSON.stringify({messages: history, stream: true})
    });
    if (!r.ok) throw new Error("server replied " + r.status);
    const reader = r.body.getReader(), dec = new TextDecoder();
    let buf = "";
    for (;;) {
      const {done, value} = await reader.read(); if (done) break;
      buf += dec.decode(value, {stream: true});
      const lines = buf.split("\n"); buf = lines.pop();
      for (const ln of lines) {
        if (!ln.startsWith("data: ")) continue;
        const payload = ln.slice(6).trim();
        if (payload === "[DONE]") continue;
        try {
          const delta = JSON.parse(payload).choices?.[0]?.delta?.content;
          if (delta) {
            text += delta; ntok++;
            bot.className = "msg bot"; bot.textContent = text;
            log.scrollTop = log.scrollHeight;
            tps.textContent =
              (ntok / ((performance.now() - t0) / 1000)).toFixed(1) + " tok/s";
          }
        } catch {}
      }
    }
    history.push({role: "assistant", content: text || "(no reply)"});
    if (!text) { bot.className = "msg bot"; bot.textContent = "(no reply)"; }
  } catch (err) {
    bot.className = "msg bot";
    bot.textContent = "Couldn't reach the model: " + err.message +
      "\nCheck `rigma status` in a terminal.";
  } finally { send.disabled = false; input.focus(); }
};
</script>
</body>
</html>
